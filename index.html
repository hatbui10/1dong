<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code & Style Merger</title>
    <style>
        :root {
            --bg-color: #080810;
            --container-bg: #0d0d16;
            --card-bg: #0a0a12;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --gold: #ffd700;
            --text-color: #94a3b8;
            --text-light: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            margin-left: 3px;
            margin-right: 3px;
            background: var(--container-bg);
            border: 1px solid #1e293b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 24px 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
        }

        /* Mode Selector Tabs */
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr;
            gap: 8px;
            background: #05050a;
            padding: 6px;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #1e293b;
            color: #64748b;
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.25s ease;
        }

        .tab-btn.active[data-mode="js"] {
            background: rgba(0, 240, 255, 0.05);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
        }

        .tab-btn.active[data-mode="css"] {
            background: rgba(255, 0, 127, 0.05);
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
        }

        .tab-btn.active[data-mode="html"] {
            background: rgba(57, 255, 20, 0.05);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
        }

        /* Info Box */
        .info-box {
            background: #070913;
            border-left: 3px solid var(--neon-blue);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .info-box.css-info { border-left-color: var(--neon-pink); }
        .info-box.html-info { border-left-color: var(--neon-green); }

        .info-box strong { color: var(--text-light); }

        .highlight-js {
            color: #ff007f;
            background: rgba(255, 0, 127, 0.1);
            padding: 1px 4px;
            border-radius: 3px;
            font-family: monospace;
        }

        /* Textareas */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-header label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .char-count {
            font-size: 0.75rem;
            color: #475569;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: #05050a;
            border: 1px solid #1e293b;
            color: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            outline: none;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* Action Buttons */
        .action-btn {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2);
            transition: all 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.97);
            filter: brightness(1.1);
        }

        /* Copy Button Overlay */
        .copy-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #334155;
            color: #fff;
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            color: #10b981;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle; margin-right: 4px;">
                <path d="M4 12V5a2 2 0 0 1 2-2h7l5 5v4"/>
                <path d="M14 3v5h5"/>
                <path d="M16 16l-4-4-4 4"/>
                <path d="M12 12v9"/>
            </svg>
            Merger Pro
        </h1>
        <p>Định dạng và gộp các khối logic gọn gàng</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-mode="js" onclick="switchMode('js')">
            <span class="icon" style="color: #f7df1e;">JS</span>
            Code
        </button>
        <button class="tab-btn" data-mode="css" onclick="switchMode('css')">
            <span class="icon" style="color: var(--neon-pink);">Style</span>
            Style
        </button>
        <button class="tab-btn" data-mode="html" onclick="switchMode('html')">
            <span class="icon" style="color: var(--neon-green);">&lt;/&gt;</span>
            HTML Divs
        </button>
    </div>

    <!-- Info Box -->
    <div id="infoBox" class="info-box">
        <strong>Chế độ JS:</strong> Gộp các khối code. Tự động xuống dòng khi gặp <span class="highlight-js">function</span>, <span class="highlight-js">const</span>, <span class="highlight-js">let</span>, <span class="highlight-js">var</span>. Biến bên trong function sẽ tự động thụt lề 8 khoảng trắng.
    </div>

    <!-- Input -->
    <div class="field-group">
        <div class="field-header">
            <label for="inputCode">Dán mã nguồn vào đây:</label>
            <span class="char-count" id="inputCharCount">0 ký tự</span>
        </div>
        <textarea id="inputCode" placeholder="Nhập hoặc dán mã của bạn tại đây..." oninput="updateCharCount()"></textarea>
    </div>

    <!-- Format Button -->
    <button class="action-btn" onclick="processFormat()">Định Dạng Code</button>

    <!-- Output -->
    <div class="field-group">
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy</button>
        <div class="field-header">
            <label for="outputCode">Kết quả:</label>
        </div>
        <textarea id="outputCode" readonly placeholder="Kết quả sau khi xử lý sẽ hiển thị tại đây..."></textarea>
        
    </div>
</div>

<script>
    let currentMode = 'js';

    function switchMode(mode) {
        currentMode = mode;
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn[data-mode="${mode}"]`).classList.add('active');

        const infoBox = document.getElementById('infoBox');
        if (mode === 'js') {
            infoBox.className = 'info-box';
            infoBox.innerHTML = `<strong>Chế độ JS:</strong> Gộp các khối code. Tự động xuống dòng khi gặp <span class="highlight-js">function</span>, <span class="highlight-js">const</span>, <span class="highlight-js">let</span>, <span class="highlight-js">var</span>. Biến bên trong function sẽ tự động thụt lề 8 khoảng trắng.`;
        } else if (mode === 'css') {
            infoBox.className = 'info-box css-info';
            infoBox.innerHTML = `<strong>Chế độ CSS:</strong> Tự động dọn dẹp toàn bộ khoảng trắng dư thừa, đưa mỗi block selector kèm các thuộc tính bên trong nó về nằm gọn gàng trên 1 dòng duy nhất, xuống dòng sau dấu <span class="highlight-js">}</span>.`;
        } else {
            infoBox.className = 'info-box html-info';
            infoBox.innerHTML = `<strong>Chế độ HTML Divs:</strong> Chuẩn hóa phân cấp lề (Tab) cho các thẻ đóng/mở <span class="highlight-js">&lt;div&gt;</span> giúp bạn đối chiếu nhanh, phát hiện ngay các thẻ chưa đóng hoặc bị thừa.`;
        }
        
        document.getElementById('outputCode').value = '';
    }

    function updateCharCount() {
        const text = document.getElementById('inputCode').value;
        document.getElementById('inputCharCount').innerText = `${text.length} ký tự`;
    }

    // Định dạng JS: Phân tách biến toàn cục và biến cục bộ trong function
    function formatJS(code) {
        // Gộp toàn bộ code thô thành 1 dòng sạch
        let flat = code.replace(/\r?\n|\r/g, ' ').replace(/\s+/g, ' ').trim();

        // Tạm thời tách các thành phần chính dựa trên các từ khóa khai báo
        const regex = /(?=(?:function|const|let|var)\b)/g;
        let blocks = flat.split(regex);
        
        let result = [];
        let inFunction = false;
        let braceCount = 0;

        for (let i = 0; i < blocks.length; i++) {
            let block = blocks[i].trim();
            if (!block) continue;

            // Theo dõi trạng thái đóng/mở ngoặc nhọn để biết đang ở trong hay ngoài function
            for (let char of block) {
                if (char === '{') {
                    braceCount++;
                } else if (char === '}') {
                    braceCount--;
                }
            }

            // Kiểm tra xem block này bắt đầu bằng từ khóa gì
            const isFunc = block.startsWith('function');
            const isVar = block.startsWith('const') || block.startsWith('let') || block.startsWith('var');

            if (isFunc) {
                // Xuất phát điểm của 1 hàm mới
                inFunction = true;
                result.push(block);
            } else if (isVar) {
                // Nếu là biến và đang ở trong hàm thì thụt lề 8 khoảng trắng (8 spaces)
                if (inFunction && braceCount > 0) {
                    result.push("        " + block);
                } else {
                    // Biến toàn cục ngoài hàm đặt thẳng hàng sát lề
                    result.push(block);
                }
            } else {
                // Các khối dòng khác không bắt đầu bằng từ khóa chính
                if (inFunction && braceCount > 0) {
                    result.push("        " + block);
                } else {
                    result.push(block);
                }
            }

            // Nếu số ngoặc nhọn trở về bằng 0 thì ta đã ra ngoài hoàn toàn các function
            if (braceCount <= 0) {
                braceCount = 0;
                inFunction = false;
            }
        }

        return result.join('\n');
    }

    // Thuật toán định dạng HTML Divs
    function formatHTML(html) {
        let clean = html.replace(/\s+/g, ' ').replace(/>\s+</g, '><').trim();
        let formatted = '';
        let indent = 0;
        const tab = '    ';

        const tokens = clean.split(/(<\/?[a-zA-Z0-9\-]+[^>]*>)/);

        tokens.forEach(token => {
            if (!token.trim()) return;

            if (token.match(/^<\/ /) || token.match(/^<\//)) {
                indent--;
                formatted += '\n' + tab.repeat(Math.max(0, indent)) + token;
            } 
            else if (token.match(/^<[^>]*\/>/) || token.match(/^<!--/)) {
                formatted += '\n' + tab.repeat(Math.max(0, indent)) + token;
            } 
            else if (token.match(/^<[a-zA-Z0-9\-]+/)) {
                formatted += '\n' + tab.repeat(Math.max(0, indent)) + token;
                indent++;
            } 
            else {
                formatted += '\n' + tab.repeat(Math.max(0, indent)) + token;
            }
        });

        return formatted.trim();
    }

    function processFormat() {
        const input = document.getElementById('inputCode').value;
        if (!input.trim()) {
            document.getElementById('outputCode').value = '';
            return;
        }

        let result = '';
        
        if (currentMode === 'js') {
            result = formatJS(input);
        } else if (currentMode === 'css') {
            let flat = input.replace(/\r?\n|\r/g, ' ').replace(/\s+/g, ' ').trim();
            result = flat.replace(/}\s*/g, '}\n');
        } else {
            result = formatHTML(input);
        }

        document.getElementById('outputCode').value = result;
    }

    function copyResult() {
        const output = document.getElementById('outputCode');
        if (!output.value.trim()) return;

        output.select();
        document.execCommand('copy');

        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerText = 'Đã Copy!';
        copyBtn.classList.add('copied');

        setTimeout(() => {
            copyBtn.innerText = 'Copy';
            copyBtn.classList.remove('copied');
        }, 2000);
    }
</script>

</body>
    </html>
